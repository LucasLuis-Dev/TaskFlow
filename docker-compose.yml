services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
