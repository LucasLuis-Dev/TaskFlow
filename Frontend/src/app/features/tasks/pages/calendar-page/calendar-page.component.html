<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <app-header></app-header>

    <div class="dashboard-body fade-in-up">
      
      <div class="calendar-header">
        <div class="header-titles">
          <h2>Calendário</h2>
          <p>{{ currentMonthName }}</p>
        </div>
        
        <div class="header-actions">
          <button class="nav-btn btn-icon" (click)="previousMonth()"><i class="fa-solid fa-arrow-left"></i></button>
          <button class="nav-btn btn-text" (click)="goToToday()">Hoje</button>
          <button class="nav-btn btn-icon" (click)="nextMonth()"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
      </div>

      @if (tasksFacade.isLoading()) {
        <div style="margin-top: 3.2rem;">
          <p-skeleton width="100%" height="70vh" borderRadius="16px"></p-skeleton>
        </div>
      } @else {
        <div class="calendar-container">
          
          <!-- Weekday Headers -->
          <div class="calendar-grid headers">
            @for (day of weekDays; track day) {
              <div class="weekday-header">{{ day }}</div>
            }
          </div>

          <!-- Days Grid -->
          <div class="calendar-grid days">
            @for (day of calendarDays(); track day.date.toISOString()) {
              <div class="calendar-cell" [ngClass]="{'not-current': !day.isCurrentMonth, 'is-today': day.isToday}">
                <span class="day-number" [ngClass]="{'today-badge': day.isToday}">
                  {{ day.date.getDate() }}
                </span>
                
                <div class="task-list">
                  @for (task of day.tasks; track task.id) {
                    <div class="calendar-task" 
                         [ngClass]="getTaskColorClass(task)"
                         (click)="openTask(task, $event)">
                      <span class="task-title">{{ task.title }}</span>
                    </div>
                  }
                </div>
              </div>
            }
          </div>

        </div>
      }
    </div>
  </main>
</div>

<app-create-task-modal></app-create-task-modal>
<app-edit-task-modal></app-edit-task-modal>
