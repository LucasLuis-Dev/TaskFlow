<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <app-header (newTask)="onNewTask()"></app-header>

    <div class="dashboard-body">
      <div class="welcome-section">
        <h2>Olá, Admin 👋</h2>
        <p>Aqui está o resumo das suas tarefas hoje.</p>
      </div>

      <div class="metrics-row">
        <app-metric-card title="Total" [value]="totalTasksCount()" icon="fa-solid fa-list-check" color="default"></app-metric-card>
        <app-metric-card title="Pendentes" [value]="pendingTasksCount()" icon="fa-regular fa-clock" color="primary"></app-metric-card>
        <app-metric-card title="Em andamento" [value]="inProgressTasksCount()" icon="fa-regular fa-circle-play" color="warning"></app-metric-card>
        <app-metric-card title="Concluídas" [value]="completedTasksCount()" icon="fa-regular fa-circle-check" color="success"></app-metric-card>
        <app-metric-card title="Atrasadas" [value]="overdueTasksCount()" icon="fa-solid fa-triangle-exclamation" color="danger"></app-metric-card>
      </div>

      <app-kanban-board 
        [pendingTasks]="pendingTasks()"
        [inProgressTasks]="inProgressTasks()"
        [completedTasks]="completedTasks()"
        (taskStatusChanged)="onTaskMoved($event)">
      </app-kanban-board>
    </div>
</main>
</div>

<app-create-task-modal></app-create-task-modal>
<app-edit-task-modal></app-edit-task-modal>
