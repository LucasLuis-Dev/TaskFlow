<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <app-header></app-header>

    <div class="dashboard-body fade-in-up">
      <div class="welcome-section">
        <h2>Minhas Tarefas</h2>
        <p>Acompanhe todas as tarefas atribuídas a você.</p>
      </div>

      <div class="tasks-grid">
        @if (tasksFacade.isLoading()) {
          @for (i of [1,2,3,4,5,6]; track i) {
            <p-skeleton width="100%" height="200px" borderRadius="16px"></p-skeleton>
          }
        } @else {
          @for (task of myTasks(); track task.id) {
            <app-task-card [task]="task"></app-task-card>
          } @empty {
            <div class="empty-state">
              <p>Você não tem tarefas atribuídas no momento.</p>
            </div>
          }
        }
      </div>
    </div>
  </main>
</div>

<app-create-task-modal></app-create-task-modal>
<app-edit-task-modal></app-edit-task-modal>
