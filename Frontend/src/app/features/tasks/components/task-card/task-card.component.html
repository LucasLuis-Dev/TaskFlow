<div class="task-card" (click)="openEdit()" style="cursor: pointer;">
  <div class="task-header">
    <h4 class="task-title">{{ task.title }}</h4>
    <span class="priority-badge" [ngClass]="task.priority.toLowerCase()">
      <i class="fa-regular fa-flag"></i> {{ task.priority }}
    </span>
  </div>
  
  @if (task.description) {
    <p class="task-desc">{{ task.description }}</p>
  }
  
  <div class="task-footer">
    <div class="task-meta">
      @if (task.deadline) {
        <span class="meta-item date"><i class="fa-regular fa-calendar"></i> {{ task.deadline }}</span>
      }
      @if (task.attachmentsCount) {
        <span class="meta-item attach"><i class="fa-solid fa-paperclip"></i> {{ task.attachmentsCount }}</span>
      }
    </div>
    
    <div class="task-assignee">
      <div class="avatar">{{ task.assigneeInitials || 'UN' }}</div>
    </div>
  </div>
</div>
