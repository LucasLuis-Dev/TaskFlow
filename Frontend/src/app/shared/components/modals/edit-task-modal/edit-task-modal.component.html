<p-dialog header="Editar tarefa" [(visible)]="isVisible" [modal]="true" [style]="{ width: '550px' }" [draggable]="false"
  [resizable]="false" styleClass="task-modal" [closeOnEscape]="true">
  <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="form-layout">

    <div class="field">
      <label for="title-edit">Título</label>
      <input id="title-edit" type="text" pInputText formControlName="title" />
    </div>

    <div class="field">
      <label for="desc-edit">Descrição</label>
      <textarea id="desc-edit" rows="4" pTextarea formControlName="description"></textarea>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="deadline-edit">Prazo</label>
        <p-datepicker id="deadline-edit" formControlName="deadline" dateFormat="dd/mm/yy" [showIcon]="true"
          placeholder="dd/mm/aaaa" appendTo="body"></p-datepicker>
      </div>

      <div class="field">
        <label for="priority-edit">Prioridade</label>
        <p-select id="priority-edit" [options]="priorityOptions" optionLabel="label" optionValue="value" formControlName="priority" appendTo="body"></p-select>
      </div>
    </div>

    @if (facade.isAdmin()) {
    <div class="field">
      <label for="assignee-edit">Atribuir para</label>
      <p-select id="assignee-edit" formControlName="assignee" [options]="facade.users()" optionLabel="label" optionValue="value" placeholder="Selecione um usuário" appendTo="body"></p-select>
    </div>
    }

    <div class="field">
      <label>Anexos</label>
      <p-fileUpload mode="advanced" chooseLabel="Arraste novos arquivos ou clique"
        chooseIcon="fa-solid fa-arrow-up-from-bracket" [showUploadButton]="false" [showCancelButton]="false"
        [multiple]="true" accept="image/*,.pdf,.doc,.docx" maxFileSize="1000000" (onSelect)="onUpload($event)"
        styleClass="custom-fileupload"></p-fileUpload>
        
      @if (facade.editingTask()?.attachments?.length) {
        <div class="existing-attachments">
          <label>Arquivos já anexados</label>
          <div class="attachment-list">
            @for (att of facade.editingTask().attachments; track att.fileUrl) {
              <a href="#" (click)="downloadFile(att.fileUrl, att.fileName, $event)" class="attachment-item">
                <i class="fa-solid fa-file"></i>
                <span class="attachment-name">{{ att.fileName }}</span>
                <i class="fa-solid fa-download download-icon"></i>
              </a>
            }
          </div>
        </div>
      }
    </div>

    <div class="dialog-footer edit-footer">
      <button 
        class="btn delete-btn" 
        (click)="onDelete()"
        type="button">
        <i class="fa-regular fa-trash-can"></i> Excluir
      </button>

      <div class="right-actions">
        <button 
          class="btn cancel-btn" 
          (click)="isVisible = false"
          type="button">
          Cancelar
        </button>
        <button 
          class="btn submit-btn" 
          type="submit" 
          [disabled]="editForm.invalid || facade.isLoading()">
          @if (facade.isLoading()) {
            <i class="fa-solid fa-circle-notch fa-spin"></i> Carregando...
          } @else {
            Salvar
          }
        </button>
      </div>
    </div>
  </form>
</p-dialog>
